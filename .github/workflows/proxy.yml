name: Proxy

on:
  push:
    branches: [master]
    paths:
      - 'proxy/**'
      - '.github/workflows/proxy.yml'
  pull_request:
    branches: [master]
    paths:
      - 'proxy/**'
      - '.github/workflows/proxy.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Maven build
        run: mvn -f proxy/pom.xml clean verify --batch-mode --no-transfer-progress

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: edt-mcp-proxy
          path: proxy/target/edt-mcp-proxy-*.jar
